version: 2.1
orbs:
  python: circleci/python@1.4.0
jobs:
  build_test_3_12:
    executor:
      name: python/default
      tag: "3.12"
    steps:
      - checkout
      - run:
          name: Install uv
          command: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run:
          name: Install dependencies
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            uv sync
      - run:
          name: Install test dependencies
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            uv pip install unittest-xml-reporting
      - run:
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            mkdir -p /tmp/testresults
            uv run python -m xmlrunner discover -o /tmp/testresults
      - store_test_results:
          path: /tmp/testresults
  build_test_3_13:
    executor:
      name: python/default
      tag: "3.13"
    steps:
      - checkout
      - run:
          name: Install uv
          command: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run:
          name: Install dependencies
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            uv sync
      - run:
          name: Install test dependencies
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            uv pip install unittest-xml-reporting coveralls coverage
      - run:
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            mkdir -p /tmp/testresults
            uv run coverage run --source=jacobsjsondoc -m xmlrunner discover -o /tmp/testresults
            uv run coveralls
      - store_test_results:
          path: /tmp/testresults
  test_pypi_publish:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Install uv
          command: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run:
          name: Build and publish to Test PyPI
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            uv build
            uv pip install twine
            twine upload --repository testpypi dist/*
  pypi_publish:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Install uv
          command: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run:
          name: Build and publish to PyPI
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            uv build
            uv pip install twine
            twine upload dist/*
workflows:
  build_test_publish:
    jobs:
      - build_test_3_12
      - build_test_3_13
      - test_pypi_publish:
          context:
            - python_twine_test
          requires:
            - build_test_3_12
            - build_test_3_13
          filters:
            branches:
              only:
                - next
      - pypi_publish:
          context:
            - python_twine
          requires:
            - build_test_3_12
            - build_test_3_13
          filters:
            branches:
              only:
                - master
